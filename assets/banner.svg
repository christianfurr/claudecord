<svg width="1200" height="280" viewBox="0 0 1200 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="claudecord">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1e1b2e"/>
      <stop offset="1" stop-color="#2b2440"/>
    </linearGradient>
    <linearGradient id="accent" x1="440" y1="0" x2="920" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d97757"/>
      <stop offset="1" stop-color="#8b7cf6"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="280" rx="24" fill="url(#bg)"/>

  <!-- forum post cards -->
  <g opacity="0.9">
    <rect x="72" y="62" width="270" height="44" rx="10" fill="#352d4f"/>
    <circle cx="98" cy="84" r="7" fill="#4ade80"/>
    <rect x="116" y="78" width="150" height="12" rx="6" fill="#6f6494"/>

    <rect x="72" y="118" width="270" height="44" rx="10" fill="#352d4f"/>
    <circle cx="98" cy="140" r="7" fill="#4ade80"/>
    <rect x="116" y="134" width="110" height="12" rx="6" fill="#6f6494"/>

    <rect x="72" y="174" width="270" height="44" rx="10" fill="#2e2745"/>
    <circle cx="98" cy="196" r="7" fill="#8b8b8b"/>
    <rect x="116" y="190" width="130" height="12" rx="6" fill="#584f7a"/>
  </g>

  <!-- arrows -->
  <g stroke="url(#accent)" stroke-width="4" stroke-linecap="round">
    <path d="M375 140 h44"/>
    <path d="M407 128 l14 12 -14 12"/>
  </g>

  <!-- wordmark -->
  <text x="470" y="158" font-family="Georgia, 'Times New Roman', serif" font-size="84" font-weight="700" fill="#f4f1ea">claude<tspan fill="url(#accent)">cord</tspan></text>
  <text x="474" y="204" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="26" fill="#a99fc9">every forum post is a Claude Code session</text>

  <!-- spark -->
  <g fill="url(#accent)">
    <path d="M1074 84 l10 26 26 10 -26 10 -10 26 -10 -26 -26 -10 26 -10z"/>
    <circle cx="1122" cy="150" r="6"/>
    <circle cx="1058" cy="164" r="4"/>
  </g>
</svg>
